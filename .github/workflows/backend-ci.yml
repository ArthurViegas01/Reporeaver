name: backend-ci

on:
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install (editable + dev)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        working-directory: backend
        run: ruff check src tests

      - name: Ruff (format check)
        working-directory: backend
        run: ruff format --check src tests

      - name: Pytest
        working-directory: backend
        env:
          # Provided so Pydantic Settings doesn't fail validation at import time.
          GITHUB_TOKEN: dummy_token_for_unit_tests_only_xxxxxxxxxxx
          GROQ_API_KEY: dummy_groq_key_for_unit_tests_only_xxxxxxx
          REDIS_URL: redis://localhost:6379/0
        run: pytest -ra --cov=reporeaver --cov-report=term-missing
