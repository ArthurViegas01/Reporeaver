name: infra-plan

# Runs `terraform fmt`, `validate`, and `plan` on every PR that touches /terraform.
# The region-policy validation (no SP / gru) is enforced inside variables.tf;
# this workflow surfaces the diff so reviewers see the exact resources affected.

on:
  pull_request:
    paths: ["terraform/**", ".github/workflows/infra-plan.yml"]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: infra-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform
    env:
      TF_VAR_railway_token:     ${{ secrets.RAILWAY_TOKEN }}
      TF_VAR_netlify_token:     ${{ secrets.NETLIFY_TOKEN }}
      TF_VAR_netlify_site_id:   ${{ secrets.NETLIFY_SITE_ID }}
      TF_VAR_github_token:      ${{ secrets.GITHUB_PAT_FOR_BACKEND }}
      TF_VAR_groq_api_key:      ${{ secrets.GROQ_API_KEY }}
      TF_VAR_upstash_redis_url: ${{ secrets.UPSTASH_REDIS_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      - name: terraform init (no backend config -> local state for plan only)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate -no-color

      - name: terraform plan
        id: plan
        # tfvars values come from defaults; secrets via TF_VAR_* above.
        run: terraform plan -no-color -input=false -lock=false
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const out = `### Terraform plan
            \`\`\`
            ${`${{ steps.plan.outputs.stdout }}`.slice(0, 60000)}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: out,
            });

      - name: Fail if plan errored
 