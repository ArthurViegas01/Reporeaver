version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 5
    groups:
      js-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly, day: monday }

  - package-ecosystem: docker
    directory: /backend
    schedule: { interval: weekly, day: monday }

  - package-ecosystem: terraform
    directory: /terraform
    schedule: { interval: weekly, day: monday }
