# =============================================================================
# Devscope - GitHub Portfolio Intel
# Local development stack: FastMCP server + Redis
#
# Usage:
#   cp backend/.env.example backend/.env   # fill in GITHUB_TOKEN, GROQ_API_KEY
#   docker compose up --build
#
# The MCP server listens on http://localhost:8000 (Streamable HTTP transport).
# Redis is bound to 127.0.0.1 only - never expose in production.
# =============================================================================

name: devscope

services:
  redis:
    image: redis:7.2-alpine
    container_name: devscope-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-devpassword}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - devscope-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: devscope-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: development
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/tests:/app/tests:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - devscope-net

  # Frontend is intentionally optional. Most frontend devs prefer running
  # Vite directly on the host (npm run dev) for fastest HMR.
  # Uncomment to run inside Docker.
  #
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #     target: development
  #   container_name: devscope-frontend
  #   restart: unless-stopped
  #   environment:
  #     VITE_MCP_SERVER_URL: http://localhost:8000/mcp
  #   ports:
  #     - "5173:5173"
  #   volumes:
  #     - ./frontend/src:/app/src:ro
  #     - ./frontend/public:/app/public:ro
  #   depends_on:
  #     backend:
  #       condition: service_healthy
  #   networks:
  #     - devscope-net

volumes:
  redis-data:
    driver: local

networks:
  devscope-net:
    driver: bridge
